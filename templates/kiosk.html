<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Appointment Kiosk - HMS</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="/"><h2><i class="fa-solid fa-hospital"></i> HMS</h2></a>
        <div class="nav-links">
            <span><i class="fa-solid fa-tablet-screen-button"></i> Kiosk Mode</span>
        </div>
    </nav>

    <div class="container" style="max-width: 600px; margin-top: 2rem;">
        <div class="glass-panel animate-fade-in" id="step-phone">
            <h2>Welcome! Please Enter Phone Number</h2>
            <p>We'll check if you have visited us before.</p>
            <div class="input-group">
                <input type="text" id="phone" placeholder="e.g. 555-0123" style="font-size: 1.5rem; text-align: center;">
            </div>
            <button class="btn" style="width: 100%;" onclick="checkPatient()">Continue <i class="fa-solid fa-arrow-right"></i></button>
            <div id="phone-error" style="color: var(--danger); margin-top: 1rem; text-align: center;" class="hidden"></div>
        </div>

        <div class="glass-panel hidden animate-fade-in" id="step-register">
            <h2>New Patient Registration</h2>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe">
            </div>
            <div class="grid grid-2" style="gap: 1rem;">
                <div class="input-group">
                    <label>Age</label>
                    <input type="number" id="reg-age" placeholder="30">
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <select id="reg-gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Set Password (for future portal access)</label>
                <input type="password" id="reg-pass" placeholder="Enter password">
            </div>
            <button class="btn btn-success" style="width: 100%;" onclick="registerPatient()">Register & Continue</button>
        </div>

        <div class="glass-panel hidden animate-fade-in" id="step-triage">
            <h2>Symptom details</h2>
            <p>Welcome back, <strong id="triage-name"></strong>! Please enter your current symptoms.</p>
            <div class="input-group">
                <label>Symptoms (comma separated)</label>
                <textarea id="symptoms" rows="3" placeholder="e.g. Cough, Fever, severe pain"></textarea>
                <small style="color: var(--text-secondary); display: block; margin-top: 0.5rem;">If severe, you will be automatically assigned to a specialist.</small>
            </div>
            <button class="btn" style="width: 100%;" onclick="createAppointment('Walk-in')">Generate Token</button>
        </div>

        <div class="glass-panel hidden animate-fade-in" id="step-token" style="text-align: center;">
            <h2><i class="fa-solid fa-ticket"></i> Your Token</h2>
            <div style="font-size: 4rem; font-weight: bold; color: var(--accent); margin: 1rem 0;" id="token-number"></div>
            
            <div class="grid grid-2" style="margin-top: 2rem; text-align: left;">
                <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
                    <label style="color: var(--text-secondary); font-size: 0.9rem;">Assigned Doctor</label>
                    <div style="font-size: 1.2rem; font-weight: 500;" id="assigned-doctor"></div>
                    <div id="priority-badge" class="badge" style="display: inline-block; margin-top: 0.5rem;"></div>
                </div>
                <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
                    <label style="color: var(--text-secondary); font-size: 0.9rem;">Estimated Wait Time</label>
                    <div style="font-size: 1.8rem; font-weight: bold; color: var(--warning);"><span id="wait-time"></span> mins</div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;"><span id="patients-ahead"></span> patients ahead</div>
                </div>
            </div>
            
            <button class="btn btn-secondary" style="margin-top: 2rem; width: 100%;" onclick="location.reload()">Start Over</button>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        let currentPatient = null;
        let pPhone = '';

        async function checkPatient() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) return;
            pPhone = phone;
            
            try {
                const res = await api.lookupPatient(phone);
                hideElement('step-phone');
                if (res.exists) {
                    currentPatient = res.patient;
                    document.getElementById('triage-name').innerText = currentPatient.name;
                    showElement('step-triage');
                } else {
                    showElement('step-register');
                }
            } catch (e) {
                document.getElementById('phone-error').innerText = e.message;
                showElement('phone-error');
            }
        }

        async function registerPatient() {
            const name = document.getElementById('reg-name').value;
            const age = document.getElementById('reg-age').value;
            const gender = document.getElementById('reg-gender').value;
            const password = document.getElementById('reg-pass').value;
            
            try {
                const patient = await api.registerPatient({ phone: pPhone, password, name, age, gender });
                currentPatient = patient;
                hideElement('step-register');
                document.getElementById('triage-name').innerText = currentPatient.name;
                showElement('step-triage');
            } catch (e) {
                alert(e.message);
            }
        }

        async function createAppointment(type) {
            const symptoms = document.getElementById('symptoms').value;
            if(!symptoms) {
                alert("Please enter symptoms"); return;
            }
            try {
                const res = await api.createAppointment({
                    patient_id: currentPatient.id,
                    symptoms,
                    type
                });
                hideElement('step-triage');
                
                document.getElementById('token-number').innerText = res.appointment.token_number;
                document.getElementById('assigned-doctor').innerText = res.appointment.doctor_name;
                
                const pBox = document.getElementById('priority-badge');
                pBox.innerText = res.appointment.priority;
                pBox.className = 'badge ' + (res.appointment.priority === 'Urgent' ? 'urgent' : 'normal');
                
                document.getElementById('wait-time').innerText = res.wait_time_minutes;
                document.getElementById('patients-ahead').innerText = res.patients_ahead;
                
                showElement('step-token');
            } catch (e) {
                alert(e.message);
            }
        }
    </script>
</body>
</html>
