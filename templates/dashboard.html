<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - HMS</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .med-bubble {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: #f0f2f5;
            color: var(--text-primary);
            border: 1px solid #ccc;
            border-radius: 999px;
            margin: 0.25rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .med-bubble:hover {
            background: rgba(229, 57, 53, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/"><h2><i class="fa-solid fa-user-doctor"></i> <span id="doc-title-name">Doctor</span> Dashboard</h2></a>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </nav>

    <div class="container" style="max-width: 1000px; margin-top: 2rem;">
        <div class="grid" style="grid-template-columns: 1fr 2fr;">
            
            <!-- Queue Section -->
            <div class="glass-panel" style="max-height: 80vh; overflow-y: auto;">
                <h3><i class="fa-solid fa-list-ul"></i> Patient Queue</h3>
                <button class="btn btn-secondary" style="width: 100%; margin-bottom: 1rem;" onclick="loadQueue()">Refresh Queue</button>
                <div id="queue-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Queue items populated by JS -->
                </div>
            </div>

            <!-- Consultation Section -->
            <div class="glass-panel" id="consultation-area" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 2rem;">
                    <div>
                        <h2>Consultation</h2>
                        <h3 id="patient-name" style="color: var(--accent); margin-bottom: 0;"></h3>
                        <p style="margin-top: 0.5rem;">Token: <strong id="patient-token"></strong> | Type: <span id="patient-type"></span></p>
                    </div>
                    <div id="patient-priority" class="badge"></div>
                </div>

                <div style="background: #ffffff; border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
                    <label style="color: var(--text-secondary); font-size: 0.9rem;">Reported Symptoms</label>
                    <p id="patient-symptoms" style="margin-bottom: 0; margin-top: 0.5rem;"></p>
                </div>

                <div id="video-call-area" class="hidden" style="margin-bottom: 1.5rem;">
                    <button class="btn btn-secondary" style="border-color: var(--accent); color: var(--accent); width: 100%;" onclick="alert('Joining Telemedicine Room...')"><i class="fa-solid fa-video"></i> Start Video Call</button>
                </div>

                <div class="input-group">
                    <label>Digital Prescription (Medicines)</label>
                    <textarea id="prescription-medicines" rows="5" placeholder="e.g. Paracetamol 500mg - 1 tab twice a day after meals"></textarea>
                    
                    <div style="margin-top: 0.5rem;">
                        <span class="med-bubble" onclick="addMed('Paracetamol 500mg - 1 tab twice a day')"><i class="fa-solid fa-plus"></i> Paracetamol</span>
                        <span class="med-bubble" onclick="addMed('Cough Syrup - 2 spoons thrice a day')"><i class="fa-solid fa-plus"></i> Cough Syrup</span>
                        <span class="med-bubble" onclick="addMed('Amoxicillin 250mg - 1 tab after breakfast')"><i class="fa-solid fa-plus"></i> Amoxicillin</span>
                        <span class="med-bubble" onclick="addMed('Vitamin C - 1 tab daily')"><i class="fa-solid fa-plus"></i> Vitamin C</span>
                    </div>
                </div>

                <button class="btn btn-success" style="width: 100%;" onclick="submitPrescription()">Complete Session & Issue Prescription</button>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button class="btn btn-danger" style="flex: 1;" onclick="cancelPatient()">No-Show (Delete)</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="document.getElementById('consultation-area').style.display='none'">Cancel</button>
                </div>
            </div>

            <div class="glass-panel" id="no-selection" style="display: flex; align-items: center; justify-content: center; min-height: 400px; text-align: center; color: var(--text-secondary);">
                <div>
                    <i class="fa-solid fa-clipboard-user" style="font-size: 4rem; margin-bottom: 1rem;"></i>
                    <p>Select a patient from the queue to start consultation</p>
                </div>
            </div>

        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        const dId = localStorage.getItem('doctor_id');
        const dName = localStorage.getItem('doctor_name');

        if (!dId) {
            window.location.href = '/';
        } else {
            document.getElementById('doc-title-name').innerText = dName;
            loadQueue();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        let currentAppt = null;

        async function loadQueue() {
            try {
                const res = await api.getQueue(); // optionally pass dId if we only want their patients
                const container = document.getElementById('queue-list');
                container.innerHTML = '';
                
                if (res.queue.length === 0) {
                    container.innerHTML = '<p style="text-align: center; margin-top: 2rem;">Queue is empty.</p>';
                    return;
                }

                res.queue.forEach(appt => {
                    const div = document.createElement('div');
                    div.style.background = '#ffffff';
                    div.style.border = '1px solid var(--border-color)';
                    div.style.boxShadow = 'none';
                    div.style.padding = '1rem';
                    div.style.borderRadius = '8px';
                    div.style.cursor = 'pointer';
                    div.style.borderLeft = appt.priority === 'Urgent' ? '4px solid var(--danger)' : '4px solid var(--accent)';
                    
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <strong>Token: ${appt.token_number}</strong>
                            <span class="badge ${appt.priority === 'Urgent' ? 'urgent' : 'normal'}">${appt.priority}</span>
                        </div>
                        <div style="font-weight: 500;">
                            ${appt.patient_name} 
                            ${appt.type === 'Online' ? '<span class="badge" style="background: rgba(88,166,255,0.2); color: #58a6ff; font-size: 0.7rem;">[ONLINE]</span>' : ''}
                        </div>
                        <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            Symptoms: ${appt.symptoms}
                        </div>
                        <div style="color: var(--warning); font-size: 0.8rem; margin-top: 0.5rem;">Wait: ${appt.wait_time_minutes} mins</div>
                    `;
                    
                    div.onclick = () => selectPatient(appt);
                    container.appendChild(div);
                });
            } catch (e) {
                console.error(e);
            }
        }

        function selectPatient(appt) {
            currentAppt = appt;
            document.getElementById('no-selection').style.display = 'none';
            document.getElementById('consultation-area').style.display = 'block';
            
            document.getElementById('patient-name').innerText = appt.patient_name;
            document.getElementById('patient-token').innerText = appt.token_number;
            document.getElementById('patient-type').innerText = appt.type;
            document.getElementById('patient-symptoms').innerText = appt.symptoms;
            
            if(appt.type === 'Online') {
                showElement('video-call-area');
            } else {
                hideElement('video-call-area');
            }
            
            const pBadge = document.getElementById('patient-priority');
            pBadge.innerText = appt.priority;
            pBadge.className = 'badge ' + (appt.priority === 'Urgent' ? 'urgent' : 'normal');
            
            document.getElementById('prescription-medicines').value = '';
        }

        function addMed(med) {
            const ta = document.getElementById('prescription-medicines');
            if(ta.value) ta.value += '\n' + med;
            else ta.value = med;
        }

        async function submitPrescription() {
            const meds = document.getElementById('prescription-medicines').value.trim();
            if(!meds) {
                alert("Please add medicines to prescription."); return;
            }
            
            try {
                await api.createPrescription({
                    appointment_id: currentAppt.id,
                    medicines: meds
                });
                
                alert("Prescription saved successfully!");
                document.getElementById('consultation-area').style.display = 'none';
                document.getElementById('no-selection').style.display = 'flex';
                loadQueue();
            } catch(e) {
                alert(e.message);
            }
        }

        async function cancelPatient() {
            if(!confirm("Are you sure you want to mark this patient as skipped/no-show?")) return;
            try {
                await api.updateAppointmentStatus(currentAppt.id, 'Cancelled');
                document.getElementById('consultation-area').style.display = 'none';
                document.getElementById('no-selection').style.display = 'flex';
                loadQueue();
            } catch(e) {
                alert(e.message);
            }
        }
    </script>
</body>
</html>
